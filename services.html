<body>
<div class="offline-banner" id="offlineBanner" role="status" aria-live="polite">आप ऑफ़लाइन हैं — कुछ जानकारी सीमित हो सकती है</div>

<div class="app-shell">
  <header class="site-header" id="siteHeader"></header>

  <main class="page">
    <section class="page-hero-sm">
      <span class="tag">Our Services</span>
      <h1>सभी खेती सेवाएँ</h1>
      <p>अपनी जरूरत की सेवा चुनें और तुरंत बुकिंग शुरू करें</p>
    </section>

    <section class="section" style="margin-top:20px;">
      <div id="serviceList"></div>
    </section>

    <section class="section">
      <div class="info-strip">
        <span id="infoIcon"></span>
        <p>सेवा उपलब्ध न होने पर <strong>"अन्य सेवा"</strong> चुनें और हमें WhatsApp पर अपनी आवश्यकता बताएं — हमारी टीम आपसे संपर्क करेगी।</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-links" id="footerLinks"></div>
    <div id="footerBrand"></div>
  </footer>

  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<script type="module" src="js/main.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.getElementById("infoIcon").innerHTML = krishiOxIcon("info");
    const list = document.getElementById("serviceList");
    let html = "";
    KRISHIOX_SERVICES.forEach(function (s) {
      html += '<a class="service-row" href="booking.html?service=' + s.id + '">' +
        '<span class="icon-wrap">' + krishiOxIcon(s.icon) + "</span>" +
        '<div class="row-body">' +
          '<h2>' + s.nameHi + '</h2>' +
          '<span class="s-name-en">' + s.nameEn + '</span>' +
          '<p>' + s.desc + '</p>' +
        '</div>' +
        '<span class="row-cta">' + krishiOxIcon("arrowRight") + '</span>' +
      '</a>';
    });
    list.innerHTML = html;
  });
</script>
